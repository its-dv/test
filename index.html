<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <title>Simple Notepad</title>
</head>

<body>
  <h1>Simple Notepad</h1>
  <textarea id="notepad" placeholder="Write your notes here..."></textarea>
  <br>

  <button onclick="saveText()">Save</button>

  <button onclick="loadText()">Load</button>

  <button onclick="clearNotepad()">Clear</button>

  <button id="themeButton" onclick="switchTheme()">
    <img class="fixedIcons" id="themeIcon" src="images/moon.svg" alt="Switch Theme">
  </button>

  <div class="language">
    <button id="translateButton" onclick="translate()">
      <img class="fixedIcons" src="images/translate.svg" alt="Translate">
    </button>

    <ul id="dropdownLanguages" class="dropdownLanguages hidden">
      <li onclick="translateTo('en')">English</li>
      <li onclick="translateTo('es')">Deutsch</li>
      <li onclick="translateTo('fr')">Français</li>
    </ul>
  </div>

  <!-- Character Counter In Next Commits -->

  <div id="toast" class="toast">Message</div>

  <script src="script.js"></script>

</body>
<footer>
  <p>&copy; 2026 Simple Notepad. All rights aren't reserved.</p>
  <p class="updated">Last updated: 21.04.2026</p>
</footer>
</html>
