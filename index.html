<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Notepad</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 500px;
      font-size: 18px;
    }
    button {
      margin-top: 10px;
      margin-right: 10px;
      padding: 10px 15px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Simple Notepad</h1>
  <textarea id="notepad" placeholder="Write your notes here..."></textarea>
  <br>
  <button onclick="saveText()">Save</button>
  <button onclick="loadText()">Load</button>

  <script>
    const textarea = document.getElementById("notepad");

    // Сохраняем текст в localStorage
    function saveText() {
      localStorage.setItem("notepadContent", textarea.value);
      alert("Saved!");
    }

    // Загружаем текст из localStorage
    function loadText() {
      const saved = localStorage.getItem("notepadContent");
      alert("Loaded!");
      if (saved !== null) {
        textarea.value = saved;
      } else {
        alert("Nothing saved yet.");
      }
    }

    // Автозагрузка при открытии страницы
    window.onload = () => {
      const saved = localStorage.getItem("notepadContent");
      if (saved) {
        textarea.value = saved;
      }
    };
  </script>
</body>
</html>
